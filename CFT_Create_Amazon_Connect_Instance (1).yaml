#Create supervisor routing profile
  CreateSupervisorRP:
    Type: 'AWS::Connect::RoutingProfile'
    DependsOn:
      - LambdaToGetQueuesArnsPreInfo
    Properties:
      Description: 'Supervisor routing profile for task management, silent monitoring, and barging'      
      InstanceArn: !GetAtt AmazonConnectInstance.Arn
      Name: 'Supervisor Routing Profile'
      DefaultOutboundQueueArn: !GetAtt LambdaToGetQueuesArnsPreInfo.BasicQueue
      MediaConcurrencies:
        - Channel: 'VOICE'
          Concurrency: '1'
        - Channel: 'CHAT'
          Concurrency: '1'
        - Channel: 'TASK'
          Concurrency: '1'
      QueueConfigs:
        - Priority: 1
          Delay: 0
          QueueReference:
            Channel: 'VOICE'
            QueueArn: !GetAtt LambdaToGetQueuesArnsPreInfo.SupervisorQueue 
        - Priority: 1
          Delay: 0
          QueueReference:
            Channel: 'VOICE'
            QueueArn: !GetAtt LambdaToGetQueuesArnsPreInfo.BasicQueue

