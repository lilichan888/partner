Resources:

# AMAZON CONNECT AND SERVERLESS SECTION

# Create Amazon Connect instance
  AmazonConnectInstance:
    Type: 'AWS::Connect::Instance'
    Properties:
      Attributes:
        AutoResolveBestVoices: true
        ContactflowLogs:  true
        ContactLens:  true
        EarlyMedia:  true
        InboundCalls:  true
        OutboundCalls:  true
        UseCustomTTSVoices: false
      IdentityManagementType: CONNECT_MANAGED
      InstanceAlias: !Sub ws-${AWS::Region}-${AWS::AccountId}

# S3 Bucket for Amazon Connect
  AmazonConnectS3Bucket:
      Type: AWS::S3::Bucket
      Properties:
          BucketName: !Sub
            - 'qicbucket-${UUID}'
            - UUID: !Select [4, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId]]]]
          PublicAccessBlockConfiguration:
              BlockPublicAcls: True
              BlockPublicPolicy: True
              IgnorePublicAcls: True
              RestrictPublicBuckets: True
          BucketEncryption:
              ServerSideEncryptionConfiguration:
                - ServerSideEncryptionByDefault: 
                    SSEAlgorithm: 'AES256'

# KMS Key
  AmazonConnectKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMSKeyForConnect
      Enabled: true
      EnableKeyRotation: true  
      KeyPolicy:
        Version: 2012-10-17
        Id: connectkey1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'kms:*'
            Resource: '*'

# Configure Storage for Amazon Connect
  AmazonConnectStorage:
    Type: AWS::Connect::InstanceStorageConfig
    DependsOn:
      - AmazonConnectInstance
      - AmazonConnectS3Bucket
      - LambdaPreInfoFromConnect
    Properties:
      InstanceArn: !GetAtt AmazonConnectInstance.Arn
      ResourceType: CALL_RECORDINGS
      S3Config:
        BucketName: !Ref AmazonConnectS3Bucket
        BucketPrefix: recordings
        EncryptionConfig:
          EncryptionType: KMS
          KeyId: !GetAtt AmazonConnectKey.Arn
      StorageType: S3

# Create Amazon connect S3 Bucket policy
  AmazonConnectS3BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    DependsOn:
      - AmazonConnectStorage
    Properties:
      Bucket: !Ref AmazonConnectS3Bucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Action:
              - 's3:PutObject'
              - 's3:GetObject'
              - 's3:ListBucket'
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Resource: 
              - !Sub "arn:aws:s3:::${AmazonConnectS3Bucket}"
              - !Sub "arn:aws:s3:::${AmazonConnectS3Bucket}/*"              

# IAM Role for lambda functions to create Connect Components
  CoreIAMRole:
    Type: "AWS::IAM::Role"
    DependsOn:
      - AmazonConnectInstance
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
                - "sts:AssumeRole"
      Description: Required to Build Connect
      Policies:
        - PolicyName: Pre-BuildConnectComponents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - connect:list*
                  - connect:update*
                  - connect:Disassociate*
                  - connect:associate*
                  - states:StartExecution
                  - kms:ListAliases
                Resource: 
                  - "arn:aws:connect:*"
                  - "arn:aws:kms:*"
                  - "arn:aws:lambda:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - "arn:aws:logs"

# Create Supervisor Queue - SupervisorQueue
  CreateSupervisorQueue:
    Type: 'AWS::Connect::Queue'
    DependsOn:
      - LambdaInvokeConnectPreInfo
      - AmazonConnectInstance
    Properties:
      Description: 'Supervisor Queue'
      HoursOfOperationArn: !GetAtt LambdaInvokeConnectPreInfo.BasicHours
      InstanceArn: !GetAtt AmazonConnectInstance.Arn
      Name: 'SupervisorQueue'

# Lambda function to get RoutingProfile and Security Profiles
  LambdaPreInfoFromConnect:
    Type: AWS::Lambda::Function
    Properties:
      Description: Function to get Connect RoutingProfile and Security Profile
      Environment:
        Variables:
          INSTANCEARN: !GetAtt AmazonConnectInstance.Arn
      Code:
        ZipFile: |
          # MIT No Attribution

          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.

          # Permission is hereby granted, free of charge, to any person obtaining a copy of this
          # software and associated documentation files (the "Software"), to deal in the Software
          # without restriction, including without limitation the rights to use, copy, modify,
          # merge, publish, distribute, sublicense, and/or sell copies of the Software, and to
          # permit persons to whom the Software is furnished to do so.

          # THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED,
          # INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A
          # PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT
          # HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION
          # OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE
          # SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.

          import json
          import boto3
          import os
          import cfnresponse

          client = boto3.client('connect')
          kms = boto3.client('kms')

          InstanceArn= os.environ['INSTANCEARN']

          # This Lambda retrieves the details required to create a Quick Connect to trasnsfer to the Basic Queue
          def lambda_handler(event, context):
              print(event)

              if event['RequestType'] == 'Create':
                  print(event)

                  # List RoutingProfiles and Security Profiles
                  try:
                      InstanceId = InstanceArn[-36:]

                      # List RPs
                      responseListRPs = client.list_routing_profiles(
                          InstanceId=InstanceId,
                          MaxResults=1
                      )

                      print('>>> Returned Value responseListRPs :' + json.dumps(responseListRPs, indent=4, sort_keys=True, default=str))

                      # List Queues
                      responseListQueues = client.list_queues(
                          InstanceId=InstanceId,
                          QueueTypes=['STANDARD'],
                          MaxResults=10
                      )

                      print('>>> Returned Value responseListQueues :' + json.dumps(responseListQueues, indent=4, sort_keys=True, default=str))

                      # List Prompts
                      responseListPrompts = client.list_prompts(
                          InstanceId=InstanceId,
                      )

                      # List Hours Of Operations
            
                      responseHoursOfOperations = client.list_hours_of_operations(
                          InstanceId=InstanceId,
                      )
                      
                      print('>>> Returned Value responseHoursOfOperations :' + json.dumps(responseHoursOfOperations, indent=4, sort_keys=True, default=str))

                      RPList = responseListRPs ["RoutingProfileSummaryList"]
                      QList = responseListQueues ["QueueSummaryList"]
                      PromptList = responseListPrompts ["PromptSummaryList"]
                      HoursOfOperationSummaryList = responseHoursOfOperations ["HoursOfOperationSummaryList"]
                      print(PromptList)

                      for x in RPList:
                          if x['Name'] == "Basic Routing Profile":
                              BasicRPId=x['Id']
                              print("BasicRPId= " + BasicRPId)
                              BasicRPArn=x['Arn']
                              print("BasicRPArn= " + BasicRPArn)

                      for x in QList:
                          if x['Name'] == "BasicQueue":
                            BasicQueueArn=x['Arn']
                            print("BasicQueueArn= " + BasicQueueArn)

                      for x in PromptList:
                          if x['Name'] == "CustomerQueue.wav":
                              PromptArn=x['Arn']
                              print("PromptArn= " + PromptArn)

                      for x in HoursOfOperationSummaryList:
                          if x['Name'] == "Basic Hours":
                              BasicHoursArn=x['Arn']
                              print("BasicHoursArn= " + BasicHoursArn)

                      # List Security Profiles
                      responseListSecProfiles = client.list_security_profiles(
                          InstanceId=InstanceId,
                          MaxResults=50
                      )
                      print(responseListSecProfiles)
                      SecProfilesList = responseListSecProfiles ["SecurityProfileSummaryList"]

                      for x in SecProfilesList:
                          if x['Name'] == "Admin":
                              AdminSecProfileArn=x['Arn']
                              print("AdminSecProfileArn= " + AdminSecProfileArn)

                      # List of contact flows
                      responseListOfContactFlows = client.list_contact_flows(
                          InstanceId=InstanceId,
                          ContactFlowTypes=[
                              'CONTACT_FLOW',
                          ],
                          MaxResults=123
                      )
                      CFSummaryList = responseListOfContactFlows ["ContactFlowSummaryList"]
                      print('>>> Returned Value responseListOfContactFlows :' + json.dumps(CFSummaryList, indent=4, sort_keys=True, default=str))

                      for x in CFSummaryList:
                          if x['Name'] == "Sample recording behavior":
                              ContactFlowArn=x['Arn']
                              print("ContactFlowArn= " + ContactFlowArn)

                      responseData = {}
                      responseData['BasicRP'] = BasicRPArn
                      responseData['SecProfile'] = AdminSecProfileArn
                      responseData['BasicQueue'] = BasicQueueArn
                      responseData['Prompt'] = PromptArn
                      responseData['BasicHours'] = BasicHoursArn
                      responseData['ContactFlowArn'] = ContactFlowArn
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, "CustomResourcePhysicalID")
                      print(responseData)

                  except Exception as a:
                      print (a)
                      return { 'message': 'Failed listing Queues and ContactFlows' }

              else:
                  responseData = {}
                  responseData['Data'] = "Delete"
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, "CustomResourcePhysicalID")

      Handler: index.lambda_handler
      Role: !GetAtt CoreIAMRole.Arn
      Runtime: python3.9
# Run Lambda to Get Connect information
  LambdaInvokeConnectPreInfo:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - LambdaPreInfoFromConnect
    Version: "1.0"
    Properties:
      ServiceToken: !GetAtt LambdaPreInfoFromConnect.Arn

  FnAssignClaimedPhoneNumber:
    Type: AWS::Lambda::Function
    Properties:
      Description: Function to assign
      Environment:
        Variables:
          INSTANCEARN: !GetAtt AmazonConnectInstance.Arn
          PHONENUMBERARN: !GetAtt ConnectDid.PhoneNumberArn
          CONTACTFLOWARN: !GetAtt LambdaInvokeConnectPreInfo.ContactFlowArn
      Code:
        ZipFile: |
          # MIT No Attribution

          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.

          # Permission is hereby granted, free of charge, to any person obtaining a copy of this
          # software and associated documentation files (the "Software"), to deal in the Software
          # without restriction, including without limitation the rights to use, copy, modify,
          # merge, publish, distribute, sublicense, and/or sell copies of the Software, and to
          # permit persons to whom the Software is furnished to do so.

          # THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED,
          # INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A
          # PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT
          # HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION
          # OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE
          # SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.

          import json
          import boto3
          import os
          import cfnresponse

          client = boto3.client('connect')
          kms = boto3.client('kms')

          InstanceArn= os.environ['INSTANCEARN']
          DidArn = os.environ['PHONENUMBERARN']
          ContactFlowArn = os.environ['CONTACTFLOWARN']

          def lambda_handler(event, context):

            print(event)

            if event['RequestType'] == 'Create':
              try:
                InstanceId = InstanceArn[-36:]
                ContactFlowId = ContactFlowArn[-36:]
                response = client.associate_phone_number_contact_flow(
                  PhoneNumberId=DidArn,
                  InstanceId=InstanceId,
                  ContactFlowId=ContactFlowId
                )

                responseData = {}
                responseData['response'] = response
                cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, "CustomResourcePhysicalID")
                print(response)

              except Exception as a:
                print (a)
                return { 'message': 'Failed listing Queues and ContactFlows' }

            else:
                responseData = {}
                responseData['Data'] = "Delete"
                cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, "CustomResourcePhysicalID")

      Handler: index.lambda_handler
      Role: !GetAtt CoreIAMRole.Arn
      Runtime: python3.9
